# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
title: Thomas Deutsch
email: thomas@tuxpeople.org
description: >-
  IT Consultant, Kubernetes & Cloud Native Practitioner. Notes from the field,
  homelab experiments, and observations from the CNCF community.
url: https://www.thomas-deutsch.ch
github_username: tuxpeople
minimal_mistakes_skin: default
search: true

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
# Outputting
permalink: /:title/
paginate: 5 # amount of posts to show
paginate_path: /page:num/
timezone: Europe/Zurich
lang: de

include:
  - _pages

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache
  - jekyll-seo-tag

# Jekyll Feed
# Generates /feed.xml (all posts) plus per-tag feeds under /feed/by_tag/<tag>.xml
# This covers audience-* and type-* tags automatically.
feed:
  posts_limit: 20
  tags:
    path: "feed/by_tag/"
    except:
      - blog/draft
      - blog/kandidat
      - blog/publiziert

# Jekyll SEO Tag
logo: assets/images/thomas.jpg
social:
  name: Thomas Deutsch
  links:
    - https://www.linkedin.com/in/thomas-deutsch-844a1839/
    - https://github.com/tuxpeople

author:
  name   : "Thomas Deutsch"
  avatar : "/assets/images/thomas.jpg"
  bio    : "IT Consultant bei einem Schweizer Dienstleister. Kubernetes, Cloud Native & Container – täglich in Kundenprojekten und im Homelab. KubeCon-Stammgast, Miliz-Feuerwehrmann, 3D-Druck-Enthusiast."
  links:
    - label: "Website"
      icon: "fas fa-fw fa-link"
      url: "https://www.thomas-deutsch.ch"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/thomas-deutsch-844a1839/"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/tuxpeople"
    - label: "Instagram"
      icon: "fab fa-fw fa-instagram"
      url: "https://instagram.com/tdeutsch"

footer:
  links:
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/thomas-deutsch-844a1839/"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/tuxpeople"
    - label: "Instagram"
      icon: "fab fa-fw fa-instagram"
      url: "https://instagram.com/tdeutsch"
    - label: "Datenschutz"
      icon: "fas fa-fw fa-shield-alt"
      url: "/datenschutz/"

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

tag_archive:
  type: liquid
  path: /tags/
